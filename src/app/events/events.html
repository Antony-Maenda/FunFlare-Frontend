<div class="mx-auto p-4 sm:p-6 bg-white/90 backdrop-blur-sm rounded-lg shadow-md max-w-2xl md:max-w-3xl lg:max-w-4xl">
  <h2 class="text-2xl sm:text-3xl font-semibold font-inter mb-4">Create New Event</h2>

  <!-- Bind form to Angular NgForm -->
  <form #eventForm="ngForm" (ngSubmit)="onSubmit(eventForm)" class="space-y-4">
    <div>
      <label for="name" class="block text-sm sm:text-base font-medium text-gray-700">Event Name</label>
      <input
        type="text"
        id="name"
        name="name"
        [(ngModel)]="formModel.name"
        class="mt-1 block w-full p-2 sm:p-3 border border-gray-300 rounded-lg"
        placeholder="Enter event name"
        required
      />
    </div>

    <div>
      <label for="location" class="block text-sm sm:text-base font-medium text-gray-700">Location</label>
      <input
        type="text"
        id="location"
        name="location"
        [(ngModel)]="formModel.location"
        class="mt-1 block w-full p-2 sm:p-3 border border-gray-300 rounded-lg"
        placeholder="Enter event location"
        required
      />
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label for="eventStartDate" class="block text-sm sm:text-base font-medium text-gray-700">Start Date</label>
        <input
          type="date"
          id="eventStartDate"
          name="eventStartDate"
          [(ngModel)]="formModel.eventStartDate"
          class="mt-1 block w-full p-2 sm:p-3 border border-gray-300 rounded-lg"
          required
        />
      </div>
      <div>
        <label for="eventEndDate" class="block text-sm sm:text-base font-medium text-gray-700">End Date</label>
        <input
          type="date"
          id="eventEndDate"
          name="eventEndDate"
          [(ngModel)]="formModel.eventEndDate"
          class="mt-1 block w-full p-2 sm:p-3 border border-gray-300 rounded-lg"
          required
        />
      </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label for="eventStartTime" class="block text-sm sm:text-base font-medium text-gray-700">Start Time</label>
        <input
          type="time"
          id="eventStartTime"
          name="eventStartTime"
          [(ngModel)]="formModel.eventStartTime"
          class="mt-1 block w-full p-2 sm:p-3 border border-gray-300 rounded-lg"
          required
        />
      </div>
      <div>
        <label for="eventEndTime" class="block text-sm sm:text-base font-medium text-gray-700">End Time</label>
        <input
          type="time"
          id="eventEndTime"
          name="eventEndTime"
          [(ngModel)]="formModel.eventEndTime"
          class="mt-1 block w-full p-2 sm:p-3 border border-gray-300 rounded-lg"
          required
        />
      </div>
    </div>

    <div>
      <label for="eventCapacity" class="block text-sm sm:text-base font-medium text-gray-700">Capacity</label>
      <input
        type="number"
        id="eventCapacity"
        name="eventCapacity"
        [(ngModel)]="formModel.eventCapacity"
        min="1"
        class="mt-1 block w-full p-2 sm:p-3 border border-gray-300 rounded-lg"
        placeholder="Enter capacity"
        required
      />
    </div>

    <div>
      <label for="eventCategory" class="block text-sm sm:text-base font-medium text-gray-700">Event Category</label>
      <select
        id="eventCategory"
        name="eventCategory"
        [(ngModel)]="formModel.eventCategory"
        class="mt-1 block w-full p-2 sm:p-3 border border-gray-300 rounded-lg"
        required
      >
        <option value="" disabled selected>Select category</option>
        <option value="sports">Sports</option>
        <option value="concert">Concert</option>
        <option value="conference">Conference</option>
        <option value="festival">Festival</option>
        <option value="parties">Parties</option>
        <option value="movies">Movies</option>
      </select>
    </div>

    <div>
      <label for="description" class="block text-sm sm:text-base font-medium text-gray-700">Description</label>
      <textarea
        id="description"
        name="description"
        [(ngModel)]="formModel.description"
        rows="4"
        class="mt-1 block w-full p-2 sm:p-3 border border-gray-300 rounded-lg"
        placeholder="Enter event description"
        required
      ></textarea>
    </div>

    <!-- ✅ Poster Upload + Preview -->
    <div>
      <label for="poster" class="block text-sm sm:text-base font-medium text-gray-700">Event Poster Image</label>
      <input
        type="file"
        id="poster"
        name="poster"
        (change)="onFileSelected($event)"
        accept="image/jpeg,image/png,image/svg+xml"
        class="mt-1 block w-full p-2 sm:p-3 border border-gray-300 rounded-lg"
        required
      />

      <!-- Poster Preview -->
      <div *ngIf="posterPreview" class="relative mt-4 group">
        <p class="text-sm text-gray-600 mb-2">Preview:</p>
        <div
          class="relative rounded-xl overflow-hidden shadow-lg border border-cyan-200 bg-gradient-to-br from-cyan-50 to-white transition-transform duration-300 group-hover:scale-[1.02]"
        >
          <img
            [src]="posterPreview"
            alt="Poster preview"
            class="w-full h-64 object-cover transition-transform duration-500 group-hover:scale-105"
          />

          <!-- Remove Button (Lucide Trash Icon) -->
          <button
            type="button"
            (click)="removePoster()"
            class="absolute top-3 right-3 bg-gradient-to-r from-red-500 to-pink-500 text-white rounded-full p-2 opacity-80 hover:opacity-100 shadow-md transition duration-200 hover:scale-110"
            title="Remove poster"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-5 h-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3 6h18M9 6V4h6v2m2 0v14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V6h12z"
              />
            </svg>
          </button>

          <!-- Gradient overlay on hover -->
          <div
            class="absolute inset-0 bg-gradient-to-t from-black/20 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"
          ></div>
        </div>
      </div>
    </div>

    <button
      type="submit"
      class="w-full py-2 sm:py-3 px-4 bg-cyan-600 text-white rounded-lg hover:bg-cyan-700 transition-colors duration-150 text-sm sm:text-base"
    >
      Create Event
    </button>
  </form>
</div>
