<div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-lg">
  <h2 class="text-2xl font-bold text-center text-purple-700 mb-4">
    Register for FunFlare
  </h2>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-4">
    <!-- First Name -->
    <div>
      <label class="block text-sm font-medium text-gray-700">First Name</label>
      <input 
        type="text" 
        formControlName="firstName" 
        placeholder="Enter your first name"
        class="w-full border rounded-lg p-2 focus:ring focus:ring-purple-200"
      />
      <div *ngIf="registerForm.get('firstName')?.invalid && registerForm.get('firstName')?.touched" class="text-red-500 text-sm">
        First name is required.
      </div>
    </div>

    <!-- Last Name -->
    <div>
      <label class="block text-sm font-medium text-gray-700">Last Name</label>
      <input 
        type="text" 
        formControlName="lastName" 
        placeholder="Enter your last name"
        class="w-full border rounded-lg p-2 focus:ring focus:ring-purple-200"
      />
      <div *ngIf="registerForm.get('lastName')?.invalid && registerForm.get('lastName')?.touched" class="text-red-500 text-sm">
        Last name is required.
      </div>
    </div>

    <!-- Email -->
    <div>
      <label class="block text-sm font-medium text-gray-700">Email</label>
      <input 
        type="email" 
        formControlName="email" 
        placeholder="Enter your email"
        class="w-full border rounded-lg p-2 focus:ring focus:ring-purple-200"
      />
      <div *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="text-red-500 text-sm">
        Please enter a valid email.
      </div>
    </div>

    <!-- Phone Number -->
    <div>
      <label class="block text-sm font-medium text-gray-700">Phone Number</label>
      <input 
        type="text" 
        formControlName="phoneNumber" 
        placeholder="Enter your phone number"
        class="w-full border rounded-lg p-2 focus:ring focus:ring-purple-200"
      />
      <div *ngIf="registerForm.get('phoneNumber')?.invalid && registerForm.get('phoneNumber')?.touched" class="text-red-500 text-sm">
        Phone number is required.
      </div>
    </div>

    <!-- Password -->
    <div>
      <label class="block text-sm font-medium text-gray-700">Password</label>
      <input 
        type="password" 
        formControlName="password" 
        placeholder="Enter your password"
        class="w-full border rounded-lg p-2 focus:ring focus:ring-purple-200"
      />
      <div *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" class="text-red-500 text-sm">
        Password must be at least 6 characters.
      </div>
    </div>

    <!-- Organization Name (Optional) -->
    <div>
      <label class="block text-sm font-medium text-gray-700">Organization Name (Optional)</label>
      <input 
        type="text" 
        formControlName="organizationName" 
        placeholder="Enter your organization name"
        class="w-full border rounded-lg p-2 focus:ring focus:ring-purple-200"
      />
    </div>

    <!-- Checkbox: Register as Organizer -->
    <div class="flex items-center">
      <input 
        type="checkbox" 
        formControlName="isOrganizer"
        class="h-4 w-4 text-purple-600 border-gray-300 rounded"
      />
      <label class="ml-2 block text-sm text-gray-700">
        Register as Organizer
      </label>
    </div>

    <!-- Submit Button -->
    <button 
      type="submit" 
      [disabled]="registerForm.invalid"
      class="w-full px-4 py-2 bg-cyan-600 text-white rounded-lg hover:bg-green-700 transition duration-300 disabled:opacity-50">
      Register
    </button>
  </form>
</div>
