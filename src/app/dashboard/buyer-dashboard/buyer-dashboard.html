<nav class="container mx-auto flex items-center justify-between py-4 px-6">
      <!-- Logo -->
      <link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&display=swap" rel="stylesheet">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

      <!-- Logo -->
      <div
        class="text-5xl font-bold"
        style="font-family: 'Rubik Glitch', cursive;"
      >
        <span
          class="bg-gradient-to-r from-gray-600 via-white-500 to-cyan-200 bg-clip-text text-transparent drop-shadow-lg"
        >
          FunFlare
        </span>
      </div>
      <!-- Center: Search -->
      <div class="flex-1 mx-6">
        <input
          type="text"
          placeholder="Search events..."
          class="w-full px-4 py-2 border rounded-full focus:outline-none focus:ring-2 focus:ring-purple-600"
        />
      </div>

      <!-- Right: Dropdowns -->
      <div class="flex items-center space-x-6">
        <!-- Wallet Dropdown -->
        <div class="relative">
          <button
            (click)="toggleDropdown('wallet')"
            class="px-4 py-2 text-cyan-700 border border-cyan-600 rounded-full hover:bg-purple-50 transition"
          >
            Wallet
          </button>
          <div
            *ngIf="walletOpen"
            class="absolute right-0 mt-2 w-40 bg-white rounded-lg shadow-lg py-2 z-20"
          >
            <p class="px-4 py-2 text-gray-700">Balance: $120</p>
          </div>
        </div>

        <!-- Points Dropdown -->
        <div class="relative">
          <button
            (click)="toggleDropdown('points')"
            class="px-4 py-2 text-purple-700 border border-purple-600 rounded-full hover:bg-purple-50 transition"
          >
            Points
          </button>
          <div
            *ngIf="pointsOpen"
            class="absolute right-0 mt-2 w-40 bg-white rounded-lg shadow-lg py-2 z-20"
          >
            <p class="px-4 py-2 text-gray-700">Points: 250</p>
          </div>
        </div>

        <!-- Profile Dropdown -->
        <div class="relative">
          <button
            (click)="toggleDropdown('profile')"
            class="px-4 py-2 text-gray-700 border border-gray-400 rounded-full hover:bg-purple-50 transition"
          >
            Profile
          </button>
          <div
            *ngIf="profileOpen"
            class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-2 z-20"
          >
            <p class="px-4 py-2 text-gray-700 border-b">John Doe</p>
            <button
              class="block w-full text-left px-4 py-2 text-red-600 hover:bg-gray-100"
              (click)="logout()"
            >
              Logout
            </button>
          </div>
        </div>
      </div>
    </nav>

<main>
    <app-layout></app-layout>
</main>
