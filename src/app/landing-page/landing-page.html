<div class="min-h-screen flex flex-col">
  <!-- Header / Navbar -->
  <header class="bg-white shadow-md">
    <nav class="container mx-auto flex items-center justify-between py-4 px-6">
      <!-- Include Google Font in <head> -->
      <link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&display=swap" rel="stylesheet">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

      <!-- Logo -->
      <div
        class="text-5xl font-bold"
        style="font-family: 'Rubik Glitch', cursive;"
      >
        <span
          class="bg-gradient-to-r from-gray-600 via-white-500 to-cyan-200 bg-clip-text text-transparent drop-shadow-lg"
        >
          FunFlare
        </span>
      </div>

       <!-- Search (collapses better on small screens) -->
      <div class="w-full sm:w-auto flex-1 sm:mx-6 mt-3 sm:mt-0">
        <input 
          type="text" 
          placeholder="Search events..." 
          class="w-full px-4 py-2 border rounded-full focus:outline-none focus:ring-2 focus:ring-purple-600"
        />
      </div>

      <!-- Right: Auth Buttons -->
      <div
        class="flex flex-col sm:flex-row sm:space-x-4 space-y-2 sm:space-y-0"
      >
        <!-- Login Button -->
        <button
          routerLink="/login"
          class="px-4 py-2 text-black-600 border border-cyan-600 rounded-full hover:bg-purple-50 transition w-full sm:w-auto text-center"
        >
          Login
        </button>

        <!-- Register Button -->
        <button
          routerLink="/register"
          class="px-4 py-2 text-green-400 border border-cyan-600 rounded-full hover:bg-purple-50 transition w-full sm:w-auto text-center"
        >
          Sign Up
        </button>
      </div>
    </nav>
  </header>

  <!-- Main Content -->
   <app-layout></app-layout>
